source-file ~/.tmuxline.conf
setw -g base-index        1
setw -g pane-base-index   1
setw -g mode-keys         vi
setw -g aggressive-resize on

set -g default-terminal "screen-256color"
set -g mouse on
set -g prefix            C-a
set -g default-shell     "/usr/local/bin/zsh"
set -g default-command   "reattach-to-user-namespace -l $SHELL"
set -g status            off
set -g status-position   top
set -g focus-events      on
set -g renumber-windows  on

unbind r
bind r source-file ~/.tmux.conf\; display "Config reloaded!"

unbind ^A
unbind x
unbind K
bind ^A select-pane -t :.+
bind x kill-pane
bind K send-keys -R\; clear-history\; send-keys Enter\;

bind -r k resize-pane -U 5
bind -r j resize-pane -D 5
bind -r h resize-pane -L 5
bind -r H set -g status off
bind -r l resize-pane -R 5
bind -n C-S-Left swap-window -t -1
bind -n C-S-Right swap-window -t +1

bind-key    -T copy-mode    g                 command-prompt -p "goto line1" "send -X goto-line \"%%%\""
bind-key    -T copy-mode-vi :                 command-prompt -p "goto line2" "send -X goto-line \"%%%\""

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c command-prompt -p "Name of new window: " "new-window -c \"#{pane_current_path}\" -n '%%'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
#set -g @plugin 'tmux-plugins/tmux-yank'
#set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
