setw -g mode-keys         vi
setw -g base-index        1
setw -g pane-base-index   1
setw -g aggressive-resize off

set -g status            on
set -g status-position   top
set -g escape-time       10
set -g prefix            C-a
set -g focus-events      on
set -g mouse             on
set -g renumber-windows  on
set -g extended-keys     on
set -s set-clipboard     on

unbind x; bind x kill-pane
unbind r; bind r source-file ~/.tmux.conf\; display "config reloaded!"
unbind K; bind K send-keys -R\; clear-history\; send-keys Enter\;
unbind m; bind m set status\;

unbind '"'
unbind %
unbind c

bind a   setw synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"
bind '"' split-window -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   command-prompt -p "window name: " "new-window -c \"#{pane_current_path}\" -n '%%'"

bind -r k resize-pane -U 5
bind -r j resize-pane -D 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

bind -n F1 select-window -t :1
bind -n F2 select-window -t :2
bind -n F3 select-window -t :3
bind -n F4 select-window -t :4
bind -n F5 select-window -t :5
bind -n F6 select-window -t :6
bind -n F7 select-window -t :7
bind -n F8 select-window -t :8

bind -nr C-S-Left  swap-window -t -1\; previous-window
bind -nr C-S-Right swap-window -t +1\; next-window

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
is_osx="uname | grep -q Darwin"

# change this to xterm to fix the text overflow to other split
if-shell "$is_osx" "set-option -as terminal-features \",alacritty:RGB\"" "set-option -as terminal-features \",tmux-256color:RGB\""

bind -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"

# Unbind Ctrl+Enter to prevent conflict with Ctrl+j navigation
#need to add follow to windows terminal actions accordingly.
# { "command": { "action": "sendInput", "input": "\u001b[13;5u" }, "keys": "ctrl+enter" }
# { "command": { "action": "sendInput", "input": "\u001b[13;2u" }, "keys": "shift+enter" }
unbind -n C-Enter; bind -n C-Enter send-keys Escape "[13;5u"
unbind -n S-Enter; bind -n S-Enter send-keys Escape "[13;2u"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y if-shell "$is_osx" "send-keys -X copy-pipe-and-cancel 'pbcopy'" "send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -i'"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

if-shell 'test ! -d ~/.tmux/plugins/tpm' 'run-shell "mkdir -p ~/.tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @plugin '2kabhishek/tmux2k'

set -g @continuum-restore 'on'
set -g @pomodoro_on "🍅 "                      # The formatted output when the Pomodoro is running
set -g @pomodoro_complete "✔︎  "                # The formatted output when the break is running
set -g @pomodoro_pause "⏸︎  "         

set -g @tmux2k-icons-only false
set -g @tmux2k-show-powerline true

set -g @tmux2k-theme 'onedark'
set -g @tmux2k-icons-only false
set -g @tmux2k-onedark-bg "#000000"
set -g @tmux2k-window-list-alignment "left"

set -g @tmux2k-left-plugins "session pomodoro"
set -g @tmux2k-right-plugins "cpu ram time"
set -g @tmux2k-pane-border_bg default # a code typo here
set -g @tmux2k-pane-active-border-bg default

run "~/.tmux/plugins/tpm/tpm" 
